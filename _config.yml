# Jekyll configuration for GitHub Pages
title: "global-dengue-case-database-by-country-1995-2024"
description: "Database of confirmed and reported dengue cases in 31 countries across Latin America, South Asia, and Southeast Asia, with time series from 1995 to 2024. Data compiled from PAHO/WHO and national health ministries."
url: "https://juanmoisesd.github.io"
baseurl: "/global-dengue-case-database-by-country-1995-2024"

author:
  name: "Juan Moisés de la Serna Tuya"
  orcid: "0000-0002-8401-8018"
  linkedin: "https://www.linkedin.com/in/juanmoisesdelaserna/"
  scopus: "26632846700"
  institution: "Universidad Internacional de La Rioja (UNIR)"
  email: "juanmoises.delaserna@unir.net"

# SEO
tagline: "Open Research Dataset"
lang: "en"

# Social
twitter:
  username: juanmoisesd
  card: summary

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Build
theme: minima
include:
  - README.md
  - GLOSSARY.md
  - ABOUT_THE_AUTHOR.md
  - CITATION_GUIDE.md

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
